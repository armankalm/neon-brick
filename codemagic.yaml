workflows:
  android-debug:
    name: NeonBricks Debug APK
    max_build_duration: 60
    environment:
      java: 17
    scripts:
      - name: Install Gradle 8.2
        script: |
          source "$HOME/.sdkman/bin/sdkman-init.sh"
          sdk install gradle 8.2 || true
          sdk use gradle 8.2
          gradle --version
      - name: Build debug APK
        script: |
          source "$HOME/.sdkman/bin/sdkman-init.sh"
          sdk use gradle 8.2
          gradle assembleDebug --no-daemon
    artifacts:
      - app/build/outputs/apk/debug/*.apk
    publishing:
      email:
        recipients:
          - a.kalmakhambetov@luna8.kz
        notify:
          success: true
          failure: true

  android-release:
    name: NeonBricks Release APK
    max_build_duration: 60
    environment:
      java: 17
      android_signing:
        - keystore_reference
    scripts:
      - name: Install Gradle 8.2
        script: |
          source "$HOME/.sdkman/bin/sdkman-init.sh"
          sdk install gradle 8.2 || true
          sdk use gradle 8.2
          gradle --version
      - name: Build release APK
        script: |
          source "$HOME/.sdkman/bin/sdkman-init.sh"
          sdk use gradle 8.2
          gradle assembleRelease --no-daemon
    artifacts:
      - app/build/outputs/apk/release/*.apk
    publishing:
      email:
        recipients:
          - a.kalmakhambetov@luna8.kz
        notify:
          success: true
          failure: true
